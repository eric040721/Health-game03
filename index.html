
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知識挑戰賽</title>
    <style>
        :root { --primary-color: #2ecc71; --secondary-color: #3498db; --bg-color: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.3s ease; }
        .options { display: grid; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; transition: all 0.2s; }
        button.correct { background: #d4edda; border-color: #28a745; }
        button.wrong { background: #f8d7da; border-color: #dc3545; }
        #next-btn { margin-top: 20px; background: var(--secondary-color); color: white; border: none; padding: 10px 25px; display: none; width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="quiz-section">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-text" style="font-weight: bold; font-size: 1.2rem;">載入中...</div>
        <div id="option-buttons" class="options"></div>
        <button id="next-btn">下一題</button>
    </div>
    <div id="result-section" style="display: none;">
        <h2>測試結束！</h2>
        <p style="font-size: 1.5rem;">得分：<span id="score">0</span> / <span id="total">0</span></p>
        <button onclick="location.reload()" style="background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 8px;">重新挑戰</button>
    </div>
</div>
<script>
    const questions = [
        { q: "關於低劑量電腦斷層 (LDCT)，下列何者正確？", options: ["僅能看心臟", "適合肺癌高風險族群篩檢", "完全無輻射", "準確度極低"], correct: 1 },
        { q: "流行病學中，Sensitivity 是指什麼？", options: ["正確識別患病者的能力", "正確識別無病者的能力", "預測死亡率", "計算醫療成本"], correct: 0 },
        { q: "健康經濟學中 QALY 代表什麼？", options: ["品質調整壽命年", "快速診斷評估", "年度醫療支出", "數量化研究指標"], correct: 0 }
    ];
    let currentIdx = 0; let score = 0;
    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("progress-fill").style.width = (currentIdx / questions.length) * 100 + "%";
        const btnContainer = document.getElementById("option-buttons");
        btnContainer.innerHTML = "";
        q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => {
                const allBtns = btnContainer.querySelectorAll("button");
                allBtns.forEach(b => b.disabled = true);
                if(i === q.correct) { btn.classList.add("correct"); score++; }
                else { btn.classList.add("wrong"); allBtns[q.correct].classList.add("correct"); }
                document.getElementById("next-btn").style.display = "block";
            };
            btnContainer.appendChild(btn);
        });
    }
    document.getElementById("next-btn").onclick = () => {
        currentIdx++;
        if(currentIdx < questions.length) { showQuestion(); document.getElementById("next-btn").style.display = "none"; }
        else { document.getElementById("quiz-section").style.display = "none"; document.getElementById("result-section").style.display = "block"; document.getElementById("score").innerText = score; document.getElementById("total").innerText = questions.length; }
    };
    showQuestion();
</script>
</body>
</html>
